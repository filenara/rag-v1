app:
  name: "In-House AI Asistan"
  version: "2.0-Alpha"
  welcome_message: "Kurumsal teknik dokuman asistanina hos geldiniz."
  api_url: "http://127.0.0.1:8050/ask"

vector_db:
  persist_path: "./chroma_db"
  distance_metric: "cosine"
  collection_name: "doc_store"
  bm25_cache_path: "data/bm25_cache.pkl"

models:
  vllm_api_url: "http://127.0.0.1:8000"
  vision_model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
  tei_embed_url: "http://127.0.0.1:8081"
  tei_rerank_url: "http://127.0.0.1:8082"
  vision_batch_size: 4

ingestion:
  max_chunk_length: 1500
  batch_size: 32

retrieval:
  n_results: 10
  k_constant: 60
  top_k_rerank: 5