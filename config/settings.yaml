app:
  name: "In-House AI Asistan"
  version: "2.0-Alpha"
  welcome_message: "Kurumsal teknik döküman asistanına hoş geldiniz."

vector_db:
  persist_path: "./chroma_db"
  distance_metric: "cosine"
  collection_name: "doc_store"
  bm25_cache_path: "data/bm25_cache.pkl"

models:
  device: "cuda"
  vision_model: "./local_models/Qwen2.5-VL-7B-Instruct"
  embedding_model: "./local_models/bge-m3"
  reranker_model: "./local_models/bge-reranker-v2-m3"

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  batch_size: 32

system:
  use_mock_llm: false

retrieval:
  n_results: 10
  k_constant: 60
  top_k_rerank: 5