  CRITICAL INSTRUCTION: You are provided with a [REFERENCE TEXT] below. DO NOT summarize or describe this text. Your ONLY job is to describe the attached image. Use the [REFERENCE TEXT] STRICTLY as a dictionary to understand acronyms, part numbers, or the technical context of the pixels in the image.

  1. **IMAGE CLASSIFICATION:** Start by stating the type: [Graph], [Table], [Technical Drawing], or [Photograph].

  2. **IF GRAPH / CHART:**
     - **Axes:** Read the X and Y axis labels and units.
     - **Data:** Describe the trend. Extract key data points.
     - **Legend:** List what each line/color represents.

  3. **IF TABLE:**
     - **Structure:** Transcribe the content into a strict Markdown table format.
     - **Headers:** Preserve column headers exactly.

  4. **IF TECHNICAL DRAWING / SCHEMATIC:**
     - **Components:** List all identifiable parts.
     - **Connections:** Describe key connections.
     - **Labels:** OCR all part numbers, pinouts, and annotations.

  5. **IF PHOTOGRAPH:**
     - **Subject:** Describe the equipment/part shown.
     - **Condition:** Note any visible damage or status.
     - **Text:** Read all labels verbatim.

  Constraint: Output ONLY factual data about the image. Do not use conversational filler.

  [REFERENCE TEXT]
  {page_text}